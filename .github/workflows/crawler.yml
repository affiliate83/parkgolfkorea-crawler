name: 파크골프 자동 크롤러

on:
  schedule:
    - cron: '0 1 * * *'  # 매일 오전 10시 KST (UTC 01:00)
  workflow_dispatch:      # GitHub에서 수동 실행 버튼도 활성화

jobs:
  crawl:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: dedup.db 캐시 복원 (중복 방지)
        uses: actions/cache@v4
        with:
          path: crawler/dedup.db
          key: dedup-db-${{ github.run_id }}
          restore-keys: dedup-db-

      - name: 패키지 설치
        run: pip install -r crawler/requirements.txt

      - name: .env 파일 생성
        run: |
          cat > crawler/.env << 'EOF'
          WP_URL=${{ secrets.WP_URL }}
          WP_USER=${{ secrets.WP_USER }}
          WP_APP_PASS=${{ secrets.WP_APP_PASS }}
          CATEGORY_NEWS_ID=${{ secrets.CATEGORY_NEWS_ID }}
          NAVER_CLIENT_ID=${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET=${{ secrets.NAVER_CLIENT_SECRET }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          EOF

      - name: 크롤러 실행
        run: cd crawler && python main.py

      - name: 사이트맵 ping (네이버/구글 색인 요청)
        run: cd crawler && python sitemap_ping.py
