name: 파크골프 칼럼 자동 생성

on:
  schedule:
    - cron: '0 2 * * *'   # 매일 KST 11:00 (UTC 02:00)
  workflow_dispatch:       # 수동 실행 버튼

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 발행 기록 캐시 복원 (중복 방지)
        uses: actions/cache@v4
        with:
          path: crawler/columns_done.txt
          key: columns-done-${{ github.run_id }}
          restore-keys: columns-done-

      - name: 패키지 설치
        run: pip install -r crawler/requirements.txt

      - name: .env 파일 생성
        run: |
          cat > crawler/.env << 'EOF'
          WP_URL=${{ secrets.WP_URL }}
          WP_USER=${{ secrets.WP_USER }}
          WP_APP_PASS=${{ secrets.WP_APP_PASS }}
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY=${{ secrets.PEXELS_API_KEY }}
          EOF

      - name: 칼럼 생성 및 발행 (하루 2편)
        run: cd crawler && python column_generator.py
